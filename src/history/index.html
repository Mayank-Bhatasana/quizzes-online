<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz History</title>
    <link rel="stylesheet" href="../scss/main.scss" />
    <link rel="icon" type="image/png" href="../assets/img/logo.svg" />
  </head>
  <body class="history-page">
    <div id="spinner-overlay" class="spinner-overlay"></div>
    <div id="spinner" class="spinner"></div>

    <div id="app-header"></div>

    <main class="history">
      <section class="history__hero">
        <h1>📜 My Quiz History</h1>
        <p>Your past quiz attempts, scores, and progress.</p>
      </section>

      <section class="history__controls">
        <label class="history__control">
          <span>Sort by</span>
          <select id="history-sort-field">
            <option value="created_at">Date</option>
            <option value="score">Score</option>
            <option value="accuracy">Accuracy</option>
            <option value="difficulty">Difficulty</option>
            <option value="subject">Subject</option>
            <option value="time_taken_seconds">Time</option>
          </select>
        </label>
        <label class="history__control">
          <span>Order</span>
          <select id="history-sort-order">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
          </select>
        </label>
      </section>

      <section id="history-list" class="history__list"></section>
      <nav id="history-pagination" class="history__pagination" aria-label="History pagination"></nav>
    </main>

    <script type="module" src="./history.ts"></script>
  </body>
</html>
